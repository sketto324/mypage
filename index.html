<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Page</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>My Page</h1>
      <nav class="site-nav">
        <ul>
          <li><a href="#about">About</a></li>
          <li><a href="#gallery">Gallery</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section id="about" class="container">
      <h2>About</h2>
      <p>ここに既存のWordPressのテキストを貼り付けてください。</p>
    </section>

    <section id="gallery" class="container">
      <h2>Gallery</h2>
      <p>ここに画像ギャラリーを配置してください。</p>
      <img src="images/sample1.jpg" alt="サンプル画像1" class="responsive" />
    </section>

    <section id="contact" class="container">
      <h2>Contact</h2>
      <p>ここに連絡先情報を貼り付けてください。</p>
      <a href="mailto:example@example.com" class="btn">メールを送る</a>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2024 My Page</p>
    </div>
  </footer>
</body>
</html>
